version: '3.8'
services:
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev
    ports:
      - "8080:8080"
  backend:
    build: ./backend
    environment:
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      - keycloak
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
